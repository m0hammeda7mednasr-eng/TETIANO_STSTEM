<!doctype html>
<html>
  <head>
    <title>Check JWT Token</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        direction: rtl;
      }
      .token-box {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        word-break: break-all;
        margin: 10px 0;
      }
      button {
        background: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #45a049;
      }
      .result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <h1>فحص JWT Token</h1>

    <button onclick="checkToken()">فحص الـ Token</button>

    <div id="result"></div>

    <script>
      function checkToken() {
        const token = localStorage.getItem("token");
        const resultDiv = document.getElementById("result");

        if (!token) {
          resultDiv.innerHTML =
            '<div class="result error"><strong>❌ مفيش Token!</strong><br>لازم تسجل دخول أولاً.</div>';
          return;
        }

        resultDiv.innerHTML =
          '<div class="result"><strong>Token موجود:</strong><div class="token-box">' +
          token +
          "</div></div>";

        // Decode JWT
        try {
          const parts = token.split(".");
          if (parts.length !== 3) {
            throw new Error("Invalid token format");
          }

          const payload = JSON.parse(atob(parts[1]));
          const now = Math.floor(Date.now() / 1000);

          let html = '<div class="result success">';
          html += "<strong>✅ Token Details:</strong><br>";
          html +=
            "<strong>User ID:</strong> " +
            (payload.id || payload.userId || "N/A") +
            "<br>";
          html +=
            "<strong>Email:</strong> " + (payload.email || "N/A") + "<br>";
          html +=
            "<strong>Issued At:</strong> " +
            new Date(payload.iat * 1000).toLocaleString("ar-EG") +
            "<br>";
          html +=
            "<strong>Expires At:</strong> " +
            new Date(payload.exp * 1000).toLocaleString("ar-EG") +
            "<br>";

          if (payload.exp < now) {
            html +=
              '<br><strong style="color: red;">⚠️ Token منتهي الصلاحية! لازم تسجل دخول تاني.</strong>';
          } else {
            html += '<br><strong style="color: green;">✅ Token صالح</strong>';
          }

          html += "</div>";
          resultDiv.innerHTML += html;
        } catch (e) {
          resultDiv.innerHTML +=
            '<div class="result error"><strong>❌ خطأ في فك تشفير الـ Token:</strong><br>' +
            e.message +
            "</div>";
        }
      }
    </script>
  </body>
</html>
